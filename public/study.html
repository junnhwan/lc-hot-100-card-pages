<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>专注刷卡 · LC Hot 100</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Serif:wght@500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./study.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/styles/github-dark.min.css" id="hljs-theme" />
</head>
<body>
  <div class="bg" aria-hidden="true"></div>

  <div class="shell">
    <header class="top">
      <a class="back" href="./index.html">← 题库列表</a>
      <div class="brand">专注刷卡</div>
      <div class="top-right">
        <span id="stats" class="stats"></span>
        <button type="button" id="theme-toggle" class="icon-btn" title="切换主题">☾</button>
      </div>
    </header>

    <div class="toolbar">
      <select id="cat-select" class="select" aria-label="分类"></select>
      <select id="mastery-select" class="select" aria-label="掌握度">
        <option value="all">全部掌握度</option>
        <option value="unknown">不会</option>
        <option value="fuzzy">模糊</option>
        <option value="known">记住了</option>
        <option value="stub">待补全</option>
      </select>
      <div id="progress" class="progress">0 / 0</div>
      <div class="toolbar-actions">
        <button type="button" id="btn-shuffle" class="btn">打乱</button>
        <button type="button" id="btn-random" class="btn">随机</button>
        <button type="button" id="btn-prev" class="btn">上一题</button>
        <button type="button" id="btn-next" class="btn btn-main">下一题</button>
      </div>
    </div>

    <main class="main">
      <div id="empty" class="empty" hidden>
        <h2>没有题目</h2>
        <p>换个分类或掌握度再试</p>
      </div>

      <article id="card" class="card" data-side="front" hidden>
        <!-- FRONT -->
        <div class="side side-front" id="side-front">
          <div class="meta">
            <span class="tag" id="front-cat">—</span>
            <span class="tag tag-m" id="front-mastery">—</span>
            <span class="tag tag-dim" id="front-pos">—</span>
          </div>
          <div class="front-center">
            <div class="num" id="front-id">#</div>
            <h1 class="title" id="front-title">…</h1>
            <p class="cue">先自己想一遍，再点下方看思路</p>
          </div>
          <div class="front-actions">
            <button type="button" id="btn-show" class="btn-big">看思路与题解</button>
            <p class="keys">空格揭晓 · ← → 切题 · R 随机</p>
          </div>
        </div>

        <!-- BACK -->
        <div class="side side-back" id="side-back" hidden>
          <div class="meta">
            <span class="tag" id="back-cat">—</span>
            <a class="tag tag-link" id="back-lc" href="#" target="_blank" rel="noopener">打开 LC ↗</a>
            <button type="button" id="btn-hide" class="tag tag-btn">回到正面</button>
          </div>
          <h2 class="back-title" id="back-title">—</h2>

          <section class="panel">
            <div class="panel-h">
              <h3>思路要点</h3>
            </div>
            <ul id="back-hints" class="list"></ul>
          </section>

          <section class="panel" id="notes-panel" hidden>
            <div class="panel-h"><h3>易错 / 补充</h3></div>
            <ul id="back-notes" class="list list-soft"></ul>
          </section>

          <section class="panel">
            <div class="panel-h">
              <h3>题解代码</h3>
              <button type="button" id="btn-code" class="text-btn">展开代码</button>
            </div>
            <div id="code-wrap" class="code-wrap" hidden>
              <pre><code id="back-code" class="language-go"></code></pre>
            </div>
            <div id="stub-wrap" class="stub" hidden>待补全 — 笔记里还没有这题的代码</div>
          </section>

          <div class="mastery-bar">
            <span>掌握度</span>
            <div id="mastery-btns" class="m-group">
              <button type="button" class="m-btn" data-level="unknown">不会</button>
              <button type="button" class="m-btn" data-level="fuzzy">模糊</button>
              <button type="button" class="m-btn" data-level="known">记住了</button>
            </div>
          </div>
        </div>
      </article>
    </main>

    <footer class="foot">一次一题 · 先想再看 · 进度只存在本机浏览器</footer>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/highlight.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/languages/go.min.js"></script>
  <script type="module" src="./study.js"></script>
</body>
</html>
