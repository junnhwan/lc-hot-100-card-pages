<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#06080c" />
  <title>题库列表 · LC Hot 100</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Outfit:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./ui-tokens.css?v=20" />
  <link rel="stylesheet" href="./styles.css?v=20" />
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/styles/github-dark.min.css"
    id="hljs-theme"
  />
</head>
<body class="page-list">
  <div class="canvas-frame" aria-hidden="true">
    <span class="frame-mark frame-mark-tl">CODEX</span>
    <span class="frame-mark frame-mark-br">100</span>
  </div>

  <header id="topbar">
    <div class="topbar-brand">
      <span class="brand-mark" aria-hidden="true"></span>
      <div class="brand-copy">
        <p class="brand-kicker">LC Hot 100</p>
        <h1 class="brand-title">题库列表</h1>
      </div>
    </div>
    <div class="topbar-tools">
      <label class="search-wrap" for="search">
        <span class="search-icon icon-slot" data-lucide="search" aria-hidden="true"></span>
        <input
          id="search"
          type="search"
          placeholder="搜索题号 / 标题 / slug"
          autocomplete="off"
          spellcheck="false"
        />
      </label>
      <div id="stats" class="stats" aria-live="polite">—</div>
      <a class="study-entry" href="./index.html" title="回到卡片刷题">
        <span class="icon-slot" data-lucide="layers" aria-hidden="true"></span>
        <span>刷卡</span>
      </a>
      <button id="theme-toggle" type="button" title="切换主题" aria-label="切换浅色/深色主题">
        <span class="theme-icon icon-slot" data-lucide="moon" aria-hidden="true"></span>
      </button>
    </div>
  </header>

  <div id="cat-chips" class="cat-chips" aria-label="分类（移动端）"></div>

  <div id="layout">
    <aside id="sidebar" aria-label="分类与筛选">
      <div class="sidebar-section">
        <div class="sidebar-heading">分类</div>
        <nav id="cat-list" class="cat-list"></nav>
      </div>
      <div class="sidebar-section">
        <div class="sidebar-heading">筛选</div>
        <div id="filter-chips" class="filter-chips" aria-label="掌握度筛选">
          <button type="button" class="chip is-active" data-filter="all">全部</button>
          <button type="button" class="chip" data-filter="unknown">不会</button>
          <button type="button" class="chip" data-filter="fuzzy">模糊</button>
          <button type="button" class="chip" data-filter="known">记住了</button>
          <button type="button" class="chip" data-filter="stub">待补全</button>
        </div>
      </div>
    </aside>

    <main id="main" tabindex="-1">
      <div class="loading">加载中…</div>
    </main>
  </div>

  <div id="overlay" class="overlay" hidden aria-hidden="true"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/highlight.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/languages/go.min.js"></script>
  <script type="module" src="./app.js?v=20"></script>
</body>
</html>
